name: EmaRemote Android Build

on:
  workflow_dispatch:
    inputs:
      upload-artifact:
        description: "Upload APK as artifact"
        required: false
        default: "true"
  push:
    tags:
      - "emaremote-v*"

env:
  FLUTTER_VERSION: "3.24.5"
  NDK_VERSION: "r26d"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          local-cache: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install Flutter dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Build Android APK (arm64)
        working-directory: flutter
        run: |
          cargo ndk -t aarch64-linux-android build --release -p librustdesk
          mkdir -p android/app/src/main/jniLibs/arm64-v8a/
          cp ../target/aarch64-linux-android/release/liblibrustdesk.so android/app/src/main/jniLibs/arm64-v8a/
          flutter build apk --release --target-platform android-arm64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EmaRemote-android-arm64
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
